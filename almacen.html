<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almacén — Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C9A84C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Almacén">
<link rel="apple-touch-icon" href="icon.png">
<style>
  :root {
    --oro: #C9A84C; --oro-claro: #E8C97A; --oro-opaco: #C9A84C22;
    --verde: #4CAF84; --verde-opaco: #4CAF8422;
    --negro: #0A0A08; --carbon: #0E0E0B; --carbon2: #161610; --carbon3: #1E1E16;
    --borde: #C9A84C33; --borde2: #C9A84C77;
    --texto: #F5EDD6; --texto-muted: #8A7D5A; --texto-dim: #3A3420;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Cormorant Garamond', Georgia, serif; background: var(--negro); color: var(--texto); min-height: 100vh; padding: 28px 20px 40px; }

  .ornamento { text-align: center; color: var(--oro); font-size: 11px; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 6px; opacity: 0.6; }
  header { text-align: center; margin-bottom: 24px; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; color: var(--oro-claro); letter-spacing: 4px; text-transform: uppercase; }
  header::after { content: ''; display: block; width: 100px; height: 1px; background: linear-gradient(90deg, transparent, var(--oro), transparent); margin: 14px auto 0; }
  #subtitulo { font-size: 13px; color: var(--texto-muted); margin-top: 8px; letter-spacing: 1px; font-style: italic; }

  /* FILTROS */
  .filtros { display: flex; gap: 8px; margin-bottom: 20px; }
  .filtro-btn { flex: 1; padding: 9px 8px; border: 1px solid var(--borde); background: transparent; color: var(--texto-muted); font-family: 'Cormorant Garamond', serif; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border-radius: 3px; transition: all 0.2s; text-align: center; }
  .filtro-btn.activo { border-color: var(--oro); color: var(--oro); background: var(--oro-opaco); font-weight: 700; }
  .contador-badge { display: inline-flex; align-items: center; justify-content: center; background: #8B3A3A; color: #F5C0C0; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; font-weight: 700; margin-left: 4px; }

  /* CARDS */
  .pedidos-lista { display: flex; flex-direction: column; gap: 14px; }
  .pedido-card { background: var(--carbon2); border: 1px solid var(--borde); border-radius: 4px; padding: 18px; position: relative; overflow: hidden; animation: aparecer 0.35s ease; }
  @keyframes aparecer { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  .pedido-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--oro), transparent); }
  .pedido-card.completado::before { background: linear-gradient(90deg, transparent, var(--verde), transparent); }
  .pedido-card.completado { opacity: 0.7; }

  .pedido-header { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--borde); }
  .pedido-header-top { display: flex; justify-content: space-between; align-items: center; }
  .pedido-hora { font-size: 12px; color: var(--texto-muted); letter-spacing: 1px; text-transform: uppercase; }
  .pedido-sucursal { display: inline-flex; align-items: center; gap: 6px; background: var(--oro-opaco); border: 1px solid var(--borde2); border-radius: 3px; padding: 5px 12px; font-family: 'Playfair Display', serif; font-size: 13px; color: var(--oro-claro); font-weight: 700; letter-spacing: 2px; text-transform: uppercase; align-self: flex-start; }

  .badge { font-family: 'Cormorant Garamond', serif; font-size: 12px; padding: 3px 12px; border-radius: 2px; letter-spacing: 2px; text-transform: uppercase; font-weight: 500; }
  .badge.pendiente { background: #C9A84C18; color: var(--oro); border: 1px solid #C9A84C44; }
  .badge.listo { background: #4CAF8418; color: var(--verde); border: 1px solid #4CAF8444; }
  .badge.completado-badge { background: #2563eb18; color: #7EB3FF; border: 1px solid #2563eb44; }

  /* PROGRESO */
  .progreso-wrap { margin-bottom: 12px; }
  .progreso-texto { font-size: 12px; color: var(--texto-muted); letter-spacing: 1px; margin-bottom: 6px; display: flex; justify-content: space-between; }
  .progreso-bar-bg { height: 2px; background: var(--carbon3); border-radius: 1px; overflow: hidden; }
  .progreso-bar { height: 100%; background: linear-gradient(90deg, var(--oro), var(--oro-claro)); border-radius: 1px; transition: width 0.4s ease; }

  /* ITEMS */
  .pedido-items { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .item-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--carbon); border: 1px solid var(--borde); border-radius: 3px; cursor: pointer; transition: all 0.2s; user-select: none; }
  .item-row.no-click { cursor: default; }
  .item-row:hover:not(.no-click) { border-color: var(--borde2); }
  .item-row.tachado { opacity: 0.45; border-color: transparent; }
  .item-check { width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--borde2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 11px; transition: all 0.2s; color: var(--negro); }
  .item-row.tachado .item-check { background: var(--oro); border-color: var(--oro); }
  .item-nombre { flex: 1; font-size: 15px; letter-spacing: 0.3px; transition: all 0.2s; }
  .item-row.tachado .item-nombre { text-decoration: line-through; color: var(--texto-muted); }
  .item-qty { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: var(--oro); min-width: 40px; text-align: right; }
  .item-row.tachado .item-qty { color: var(--texto-dim); }

  /* NOTA */
  .nota-texto { font-size: 13px; color: var(--texto-muted); background: var(--carbon); padding: 10px 14px; border-radius: 3px; margin-bottom: 14px; border-left: 2px solid var(--oro); font-style: italic; }

  /* NOMBRE INPUT */
  .nombre-wrap { margin-bottom: 10px; }
  .nombre-label { font-size: 11px; color: var(--texto-muted); letter-spacing: 2px; text-transform: uppercase; display: block; margin-bottom: 6px; }
  .nombre-input { width: 100%; background: var(--carbon); border: 1px solid var(--borde); border-radius: 6px; padding: 11px 14px; color: var(--texto); font-family: 'Cormorant Garamond', serif; font-size: 16px; outline: none; transition: border-color 0.2s; }
  .nombre-input:focus { border-color: var(--oro); }
  .nombre-input::placeholder { color: var(--texto-dim); font-style: italic; }

  /* NOMBRES CONFIRMADOS */
  .nombres-confirmados { background: var(--carbon); border: 1px solid var(--borde); border-radius: 6px; padding: 12px 14px; margin-bottom: 12px; }
  .nombre-confirmado-row { display: flex; align-items: center; gap: 8px; font-size: 14px; padding: 4px 0; }
  .nombre-confirmado-row:first-child { border-bottom: 1px solid var(--borde); padding-bottom: 8px; margin-bottom: 4px; }
  .nombre-confirmado-label { font-size: 11px; color: var(--texto-muted); letter-spacing: 1px; text-transform: uppercase; min-width: 100px; }
  .nombre-confirmado-valor { color: var(--oro-claro); font-weight: 600; font-family: 'Playfair Display', serif; }

  /* BOTONES */
  .acciones { display: flex; flex-direction: column; gap: 8px; }
  .btn-listo { width: 100%; padding: 13px; background: transparent; color: var(--oro); border: 1px solid var(--oro); border-radius: 3px; font-family: 'Playfair Display', serif; font-size: 13px; font-weight: 600; cursor: pointer; letter-spacing: 3px; text-transform: uppercase; transition: all 0.2s; position: relative; overflow: hidden; }
  .btn-listo::before { content: ''; position: absolute; inset: 0; background: var(--oro); transform: scaleX(0); transform-origin: left; transition: transform 0.25s ease; }
  .btn-listo:hover:not(:disabled)::before { transform: scaleX(1); }
  .btn-listo:hover:not(:disabled) { color: var(--negro); }
  .btn-listo span { position: relative; z-index: 1; }
  .btn-listo:disabled { border-color: var(--borde); color: var(--texto-dim); cursor: not-allowed; }
  .btn-listo:disabled::before { display: none; }
  .btn-excel { width: 100%; padding: 11px; background: transparent; color: var(--verde); border: 1px solid #4CAF8444; border-radius: 3px; font-family: 'Cormorant Garamond', serif; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; display: none; }
  .btn-excel.visible { display: block; }
  .btn-excel:hover { background: var(--verde-opaco); border-color: var(--verde); }
  .btn-deshacer { width: 100%; padding: 10px; background: transparent; color: var(--texto-dim); border: 1px solid var(--texto-dim); border-radius: 3px; font-family: 'Cormorant Garamond', serif; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
  .btn-deshacer:hover { color: var(--texto-muted); border-color: var(--texto-muted); }

  /* SIN PEDIDOS */

  /* NOTA POR ITEM */
  .item-nota-btn {
    flex-shrink: 0;
    background: transparent;
    border: 1px solid var(--borde2);
    color: var(--texto-muted);
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .item-nota-btn:active { background: var(--oro-opaco); border-color: var(--oro); color: var(--oro); }
  .item-nota-btn.tiene-nota { background: var(--oro-opaco); border-color: var(--oro); color: var(--oro); }

  .item-nota-wrap {
    padding: 6px 14px 8px;
    display: none;
    background: var(--carbon);
    border-left: 1px solid var(--borde);
    border-right: 1px solid var(--borde);
    border-bottom: 1px solid var(--borde);
    border-radius: 0 0 3px 3px;
    margin-top: -1px;
  }
  .item-nota-wrap.visible { display: block; }
  .item-nota-input {
    width: 100%; background: transparent;
    border: none; border-bottom: 1px solid var(--borde);
    color: var(--texto); font-family: 'Cormorant Garamond', serif;
    font-size: 14px; outline: none; padding: 4px 0;
    resize: none;
  }
  .item-nota-input::placeholder { color: var(--texto-dim); font-style: italic; }
  .item-nota-input:focus { border-bottom-color: var(--oro); }

  .sin-pedidos { text-align: center; padding: 50px 20px; border: 1px solid var(--borde); border-radius: 4px; background: var(--carbon2); }
  .sin-pedidos .ornamento-vacio { font-size: 28px; display: block; margin-bottom: 14px; color: var(--borde2); }
  .sin-pedidos p { font-size: 15px; color: var(--texto-muted); font-style: italic; }

  /* TOAST */
  .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--carbon2); border: 1px solid var(--oro); color: var(--oro-claro); padding: 14px 32px; border-radius: 3px; font-family: 'Cormorant Garamond', serif; font-size: 15px; letter-spacing: 1px; transition: transform 0.3s ease; z-index: 999; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<div class="ornamento">✦ &nbsp; Almacén &nbsp; ✦</div>
<header>
  <h1>Almacén</h1>
  <p id="subtitulo">Esperando pedidos...</p>
</header>

<div class="filtros">
  <button class="filtro-btn activo" id="filtro-pendiente" onclick="setFiltro('pendiente')">
    Pendientes <span class="contador-badge" id="countPendiente">0</span>
  </button>
  <button class="filtro-btn" id="filtro-entrega" onclick="setFiltro('entrega')">
    Entrega <span class="contador-badge" id="countEntrega" style="display:none"></span>
  </button>
  <button class="filtro-btn" id="filtro-listo" onclick="setFiltro('listo')">
    Listos
  </button>
</div>

<div class="pedidos-lista" id="pedidosLista">
  <div class="sin-pedidos"><span class="ornamento-vacio">⏳</span><p>Conectando...</p></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyA_oHjATWDHDvSv7ztqPDfWJkXuLR9ceZs",
    authDomain: "proyecto-2-bara.firebaseapp.com",
    projectId: "proyecto-2-bara",
    storageBucket: "proyecto-2-bara.firebasestorage.app",
    messagingSenderId: "467039108962",
    appId: "1:467039108962:web:e7eb55bd1e10eca09bf63b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let pedidos = [];
  let filtroActual = 'pendiente';
  const tachados = {};
  const notasItems = {}; // {pedidoId: {idx: 'nota'}}

  // ── FILTROS ──
  window.setFiltro = function(f) {
    filtroActual = f;
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('activo'));
    document.getElementById('filtro-' + f).classList.add('activo');
    renderVista();
  };

  function formatHora(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleTimeString('es-BO', { hour: '2-digit', minute: '2-digit' });
  }

  function formatFecha(ts) {
    if (!ts) return new Date().toLocaleDateString('es-BO');
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('es-BO') + ' ' + d.toLocaleTimeString('es-BO', { hour: '2-digit', minute: '2-digit' });
  }

  // ── RENDER PRINCIPAL ──
  function renderVista() {
    if (filtroActual === 'pendiente') renderPendientes();
    else if (filtroActual === 'entrega') renderEntrega();
    else if (filtroActual === 'listo') renderListos();
  }

  // ── PENDIENTES: tachado item por item + nombre + confirmar ──
  function renderPendientes() {
    const lista = document.getElementById('pedidosLista');
    const items = pedidos.filter(p => p.estado === 'pendiente');
    if (items.length === 0) {
      lista.innerHTML = `<div class="sin-pedidos"><span class="ornamento-vacio">✅</span><p>Sin pedidos pendientes</p></div>`;
      return;
    }
    lista.innerHTML = items.map(p => buildCardPendiente(p)).join('');
  }

  function buildCardPendiente(p) {
    if (!tachados[p.id]) tachados[p.id] = new Set();
    const total = p.items.length;
    const hechos = tachados[p.id].size;
    const todosListos = hechos === total;
    const pct = total > 0 ? Math.round((hechos / total) * 100) : 0;

    return `
    <div class="pedido-card" id="card-${p.id}">
      <div class="pedido-header">
        <div class="pedido-header-top">
          <span class="pedido-hora">🕐 ${formatHora(p.timestamp)}</span>
          <span class="badge pendiente">Pendiente</span>
        </div>
        <span class="pedido-sucursal">${p.sucursalIcono || '🏠'} ${p.sucursal || ''}</span>
      </div>
      <div class="progreso-wrap">
        <div class="progreso-texto"><span>Preparación</span><span>${hechos} / ${total}</span></div>
        <div class="progreso-bar-bg"><div class="progreso-bar" style="width:${pct}%"></div></div>
      </div>
      <div class="pedido-items">
        ${p.items.map((it, idx) => {
          const nota = (notasItems[p.id] && notasItems[p.id][idx]) || '';
          const tieneNota = nota.length > 0;
          return `
          <div>
            <div class="item-row ${tachados[p.id].has(idx) ? 'tachado' : ''}" onclick="toggleItem('${p.id}',${idx})">
              <div class="item-check">${tachados[p.id].has(idx) ? '✓' : ''}</div>
              <span class="item-nombre">${it.nombre}</span>
              <span class="item-qty">× ${it.cantidad}</span>
              <button class="item-nota-btn ${tieneNota ? 'tiene-nota' : ''}"
                onclick="event.stopPropagation();toggleNota('${p.id}',${idx})"
                id="notaBtn-${p.id}-${idx}">
                ${tieneNota ? '✎ Nota' : '+ Nota'}
              </button>
            </div>
            <div class="item-nota-wrap ${tieneNota ? 'visible' : ''}" id="notaWrap-${p.id}-${idx}">
              <textarea class="item-nota-input" rows="1"
                id="notaInput-${p.id}-${idx}"
                placeholder="Escribí una nota para este producto..."
                oninput="guardarNota('${p.id}',${idx},this.value)"
              >${nota}</textarea>
            </div>
          </div>`;
        }).join('')}
      </div>
      ${p.nota ? `<div class="nota-texto">${p.nota}</div>` : ''}
      <div class="acciones">
        ${todosListos ? `
          <div class="nombre-wrap">
            <span class="nombre-label">Tu nombre — Entregué conforme</span>
            <input type="text" class="nombre-input" id="nombreEntrega-${p.id}" placeholder="Escribí tu nombre..." />
          </div>` : ''}
        <button class="btn-listo" onclick="confirmarEntrega('${p.id}')" ${!todosListos ? 'disabled' : ''}>
          <span>${todosListos ? 'Confirmar entrega' : `Tachá todos los ítems (${hechos}/${total})`}</span>
        </button>
      </div>
    </div>`;
  }

  window.toggleItem = function(pedidoId, idx) {
    if (!tachados[pedidoId]) tachados[pedidoId] = new Set();
    if (tachados[pedidoId].has(idx)) tachados[pedidoId].delete(idx);
    else tachados[pedidoId].add(idx);
    const el = document.getElementById('card-' + pedidoId);
    const p = pedidos.find(x => x.id === pedidoId);
    if (el && p) el.outerHTML = buildCardPendiente(p);
  };

  window.toggleNota = function(pedidoId, idx) {
    const wrap = document.getElementById(`notaWrap-${pedidoId}-${idx}`);
    const btn  = document.getElementById(`notaBtn-${pedidoId}-${idx}`);
    const input = document.getElementById(`notaInput-${pedidoId}-${idx}`);
    if (!wrap) return;
    const visible = wrap.classList.toggle('visible');
    if (visible && input) input.focus();
  };

  window.guardarNota = function(pedidoId, idx, valor) {
    if (!notasItems[pedidoId]) notasItems[pedidoId] = {};
    notasItems[pedidoId][idx] = valor;
    const btn = document.getElementById(`notaBtn-${pedidoId}-${idx}`);
    if (btn) {
      btn.textContent = valor.trim().length > 0 ? '✎ Nota' : '+ Nota';
      btn.classList.toggle('tiene-nota', valor.trim().length > 0);
    }
  };

  window.confirmarEntrega = async function(pedidoId) {
    const input = document.getElementById('nombreEntrega-' + pedidoId);
    const nombre = input ? input.value.trim() : '';
    if (!nombre) { mostrarToast('Escribí tu nombre para confirmar'); return; }
    const btn = document.querySelector(`#card-${pedidoId} .btn-listo`);
    if (btn) { btn.disabled = true; btn.querySelector('span').textContent = 'Confirmando...'; }
    try {
      // Merge notas into items
      const p = pedidos.find(x => x.id === pedidoId);
      const itemsConNota = p ? p.items.map((it, idx) => ({
        ...it,
        notaAlmacen: (notasItems[pedidoId] && notasItems[pedidoId][idx]) || ''
      })) : [];

      await updateDoc(doc(db, 'pedidos', pedidoId), {
        estado: 'entregado',
        entregadoPor: nombre,
        fechaEntrega: serverTimestamp(),
        items: itemsConNota
      });
      mostrarToast('✦ Entrega confirmada — ' + nombre);
      // Auto-switch a tab Entrega
      setTimeout(() => setFiltro('entrega'), 800);
    } catch(e) {
      console.error(e);
      mostrarToast('Error al confirmar entrega');
      if (btn) { btn.disabled = false; btn.querySelector('span').textContent = 'Confirmar entrega'; }
    }
  };

  // ── ENTREGA: pedidos en estado 'entregado', esperando confirmacion de barra ──
  function renderEntrega() {
    const lista = document.getElementById('pedidosLista');
    const items = pedidos.filter(p => p.estado === 'entregado');
    if (items.length === 0) {
      lista.innerHTML = `<div class="sin-pedidos"><span class="ornamento-vacio">✦</span><p>No hay pedidos esperando confirmación de la barra</p></div>`;
      return;
    }
    lista.innerHTML = items.map(p => `
      <div class="pedido-card" id="card-${p.id}">
        <div class="pedido-header">
          <div class="pedido-header-top">
            <span class="pedido-hora">🕐 ${formatHora(p.timestamp)}</span>
            <span class="badge listo">En espera de barra</span>
          </div>
          <span class="pedido-sucursal">${p.sucursalIcono || '🏠'} ${p.sucursal || ''}</span>
        </div>
        <div class="pedido-items">
          ${p.items.map(it => `
            <div class="item-row tachado no-click">
              <div class="item-check">✓</div>
              <span class="item-nombre">${it.nombre}</span>
              <span class="item-qty">× ${it.cantidad}</span>
            </div>`).join('')}
        </div>
        ${p.nota ? `<div class="nota-texto">${p.nota}</div>` : ''}
        <div class="nombres-confirmados">
          <div class="nombre-confirmado-row">
            <span class="nombre-confirmado-label">Entregó:</span>
            <span class="nombre-confirmado-valor">${p.entregadoPor || '—'}</span>
          </div>
          <div class="nombre-confirmado-row">
            <span class="nombre-confirmado-label">Esperando firma de:</span>
            <span style="color:var(--texto-muted);font-style:italic;font-size:13px">Barra — ${p.sucursal || ''}</span>
          </div>
        </div>
        <div class="acciones">
          <button class="btn-deshacer" onclick="deshacerEntrega('${p.id}')">↩ Deshacer entrega</button>
        </div>
      </div>`).join('');
  }

  window.deshacerEntrega = async function(id) {
    if (tachados[id]) tachados[id].clear();
    await updateDoc(doc(db, 'pedidos', id), { estado: 'pendiente', entregadoPor: '', fechaEntrega: null });
  };

  // ── LISTOS: pedidos completados (ambos confirmaron) ──
  function renderListos() {
    const lista = document.getElementById('pedidosLista');
    const items = pedidos.filter(p => p.estado === 'completado');
    if (items.length === 0) {
      lista.innerHTML = `<div class="sin-pedidos"><span class="ornamento-vacio">📭</span><p>Sin pedidos completados</p></div>`;
      return;
    }
    lista.innerHTML = items.map(p => `
      <div class="pedido-card completado" id="card-${p.id}">
        <div class="pedido-header">
          <div class="pedido-header-top">
            <span class="pedido-hora">🕐 ${formatHora(p.timestamp)}</span>
            <span class="badge completado-badge">Completado ✓</span>
          </div>
          <span class="pedido-sucursal">${p.sucursalIcono || '🏠'} ${p.sucursal || ''}</span>
        </div>
        <div class="pedido-items">
          ${p.items.map(it => `
            <div class="item-row tachado no-click">
              <div class="item-check">✓</div>
              <span class="item-nombre">${it.nombre}</span>
              <span class="item-qty">× ${it.cantidad}</span>
            </div>`).join('')}
        </div>
        ${p.nota ? `<div class="nota-texto">${p.nota}</div>` : ''}
        <div class="nombres-confirmados">
          <div class="nombre-confirmado-row">
            <span class="nombre-confirmado-label">Entregó:</span>
            <span class="nombre-confirmado-valor">${p.entregadoPor || '—'}</span>
          </div>
          <div class="nombre-confirmado-row">
            <span class="nombre-confirmado-label">Recibió:</span>
            <span class="nombre-confirmado-valor">${p.recibidoPor || '—'}</span>
          </div>
        </div>
        <div class="acciones">
          <button class="btn-excel visible" onclick="descargarExcel('${p.id}')">↓ Descargar Excel</button>
        </div>
      </div>`).join('');
  }

  // ── EXCEL ──
  window.descargarExcel = async function(pedidoId) {
    const p = pedidos.find(x => x.id === pedidoId);
    if (!p) return;

    const sucursal = (p.sucursal || '').toUpperCase();
    const fecha    = formatFecha(p.timestamp);

    const wb = new ExcelJS.Workbook();
    const ws = wb.addWorksheet('Pedido', { pageSetup: { fitToPage: true, fitToWidth: 1 } });

    // ── Colores ──
    const AZUL_OSC  = { argb: 'FF1F3864' };
    const AZUL_MED  = { argb: 'FF2E5AA8' };
    const AZUL_CLAR = { argb: 'FFD6E4F7' };
    const GRIS_MED  = { argb: 'FFE0E0E0' };
    const BLANCO    = { argb: 'FFFFFFFF' };
    const NEGRO     = { argb: 'FF000000' };

    const bThin = { style: 'thin',   color: { argb: 'FF000000' } };
    const bMed  = { style: 'medium', color: { argb: 'FF000000' } };
    const bHair = { style: 'hair',   color: { argb: 'FFCCCCCC' } };
    const allThin = { top: bThin, bottom: bThin, left: bThin, right: bThin };
    const allMed  = { top: bMed,  bottom: bMed,  left: bMed,  right: bMed  };
    const softBor = { top: bHair, bottom: bHair, left: bHair, right: bHair };

    const solidFill = (color) => ({ type: 'pattern', pattern: 'solid', fgColor: color });

    const applyStyle = (cell, { value, font, fill, alignment, border, numFmt } = {}) => {
      if (value !== undefined) cell.value = value;
      if (font)      cell.font      = font;
      if (fill)      cell.fill      = fill;
      if (alignment) cell.alignment = alignment;
      if (border)    cell.border    = border;
      if (numFmt)    cell.numFmt    = numFmt;
    };

    // ── Anchos de columna ──
    ws.columns = [
      { width: 6  }, // A - ID
      { width: 30 }, // B - PRODUCTO
      { width: 16 }, // C - CATEGORÍA
      { width: 10 }, // D - UNIDAD
      { width: 10 }, // E - CANTIDAD
      { width: 22 }, // F - OBSERVACIONES
      { width: 26 }, // G - NOTA ALMACÉN
    ];

    // ── Fila 1: espaciado ──
    ws.getRow(1).height = 6;

    // ── Fila 2: Título ──
    ws.getRow(2).height = 36;
    ws.mergeCells('A2:G2');
    applyStyle(ws.getCell('A2'), {
      value:     'LISTA DE PEDIDOS',
      font:      { bold: true, size: 18, name: 'Arial', color: BLANCO },
      fill:      solidFill(AZUL_OSC),
      alignment: { horizontal: 'center', vertical: 'middle' },
      border:    allMed,
    });

    // ── Fila 3: espaciado ──
    ws.getRow(3).height = 10;

    // ── Fila 4: Sucursal / Fecha ──
    ws.getRow(4).height = 28;
    ws.mergeCells('B4:C4');
    ws.mergeCells('F4:G4');

    applyStyle(ws.getCell('A4'), { fill: solidFill(GRIS_MED), border: allThin });
    applyStyle(ws.getCell('B4'), {
      value:     'SUCURSAL:  ' + sucursal,
      font:      { bold: true, size: 12, name: 'Arial', color: AZUL_MED },
      fill:      solidFill(AZUL_CLAR),
      alignment: { horizontal: 'left', vertical: 'middle' },
      border:    allMed,
    });
    applyStyle(ws.getCell('D4'), { fill: solidFill(GRIS_MED), border: { top: bThin, bottom: bThin } });
    applyStyle(ws.getCell('E4'), {
      value:     'FECHA:',
      font:      { bold: true, size: 11, name: 'Arial', color: AZUL_OSC },
      fill:      solidFill(GRIS_MED),
      alignment: { horizontal: 'left', vertical: 'middle' },
      border:    allThin,
    });
    applyStyle(ws.getCell('F4'), {
      value:     fecha,
      font:      { size: 11, name: 'Arial', color: AZUL_MED },
      fill:      solidFill(AZUL_CLAR),
      alignment: { horizontal: 'center', vertical: 'middle' },
      border:    allThin,
    });

    // ── Fila 5: espaciado ──
    ws.getRow(5).height = 10;

    // ── Fila 6: Headers ──
    ws.getRow(6).height = 22;
    const HEADERS = ['ID','PRODUCTO','CATEGORÍA','UNIDAD','CANTIDAD','OBSERVACIONES','NOTA ALMACÉN'];
    const headerRow = ws.getRow(6);
    HEADERS.forEach((h, i) => {
      const cell = headerRow.getCell(i + 1);
      applyStyle(cell, {
        value:     h,
        font:      { bold: true, size: 10, name: 'Arial', color: BLANCO },
        fill:      solidFill(AZUL_MED),
        alignment: { horizontal: 'center', vertical: 'middle' },
        border:    allThin,
      });
    });

    // ── Filas de datos ──
    p.items.forEach((it, i) => {
      const rowNum = 7 + i;
      ws.getRow(rowNum).height = 18;
      const bgColor = i % 2 === 0 ? BLANCO : AZUL_CLAR;
      const vals = [it.num||'', it.nombre||'', it.cat||'', it.unidad||'UNIDAD', it.cantidad, '', it.notaAlmacen||''];
      const aligns = ['center','left','left','center','center','left','left'];
      vals.forEach((v, ci) => {
        const cell = ws.getRow(rowNum).getCell(ci + 1);
        applyStyle(cell, {
          value:     v,
          font:      { size: 10, name: 'Arial', color: NEGRO },
          fill:      solidFill(bgColor),
          alignment: { horizontal: aligns[ci], vertical: 'middle', wrapText: ci === 6 },
          border:    allThin,
        });
      });
    });

    // ── Filas vacías con borde suave hasta firma ──
    const dataEnd   = 7 + p.items.length;
    const firmaStart = Math.max(dataEnd + 3, 54);
    for (let r = dataEnd; r < firmaStart; r++) {
      ws.getRow(r).height = 16;
      for (let c = 1; c <= 7; c++) {
        ws.getRow(r).getCell(c).border = softBor;
      }
    }

    // Nota general
    if (p.nota) {
      const nr = firmaStart - 2;
      ws.mergeCells(`C${nr}:G${nr}`);
      applyStyle(ws.getCell(`B${nr}`), { value: 'Nota general:', font:{bold:true,size:10,name:'Arial'}, fill:solidFill(GRIS_MED), border:allThin });
      applyStyle(ws.getCell(`C${nr}`), { value: p.nota, font:{size:10,name:'Arial'}, alignment:{wrapText:true}, border:allThin });
    }

    // ── Firmas ──
    const fr = firmaStart + 1;
    ws.getRow(fr).height = 26;
    ws.getRow(fr + 2).height = 28;
    ws.getRow(fr + 3).height = 18;

    ws.mergeCells(`B${fr}:C${fr}`);
    applyStyle(ws.getCell(`B${fr}`), {
      value:     'RECIBÍ CONFORME',
      font:      { bold: true, size: 11, name: 'Arial', color: AZUL_OSC },
      fill:      solidFill(GRIS_MED),
      alignment: { horizontal: 'center', vertical: 'middle' },
      border:    allMed,
    });

    ws.mergeCells(`E${fr}:G${fr}`);
    applyStyle(ws.getCell(`E${fr}`), {
      value:     'ENTREGUÉ CONFORME',
      font:      { bold: true, size: 11, name: 'Arial', color: AZUL_OSC },
      fill:      solidFill(GRIS_MED),
      alignment: { horizontal: 'center', vertical: 'middle' },
      border:    allMed,
    });

    // Nombre recibió
    ws.mergeCells(`B${fr+2}:C${fr+2}`);
    applyStyle(ws.getCell(`B${fr+2}`), {
      value:     p.recibidoPor || '________________________',
      font:      { bold: true, size: 12, name: 'Arial', color: NEGRO },
      alignment: { horizontal: 'center', vertical: 'middle' },
      border:    { bottom: bMed },
    });

    // Nombre entregó
    ws.mergeCells(`E${fr+2}:G${fr+2}`);
    applyStyle(ws.getCell(`E${fr+2}`), {
      value:     p.entregadoPor || '________________________',
      font:      { bold: true, size: 12, name: 'Arial', color: NEGRO },
      alignment: { horizontal: 'center', vertical: 'middle' },
      border:    { bottom: bMed },
    });

    // Subtítulos firma
    ws.mergeCells(`B${fr+3}:C${fr+3}`);
    applyStyle(ws.getCell(`B${fr+3}`), { value: 'Nombre y firma', font:{ italic:true, size:9, name:'Arial', color:{argb:'FF888888'}}, alignment:{horizontal:'center'} });
    ws.mergeCells(`E${fr+3}:G${fr+3}`);
    applyStyle(ws.getCell(`E${fr+3}`), { value: 'Nombre y firma', font:{ italic:true, size:9, name:'Arial', color:{argb:'FF888888'}}, alignment:{horizontal:'center'} });

    // ── Descargar ──
    const buffer = await wb.xlsx.writeBuffer();
    const blob   = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url    = URL.createObjectURL(blob);
    const a      = document.createElement('a');
    a.href       = url;
    a.download   = 'pedido_' + sucursal + '_' + new Date().toLocaleDateString('es-BO').replace(/\//g, '-') + '.xlsx';
    a.click();
    URL.revokeObjectURL(url);
    mostrarToast('✦ Excel descargado');
  };

  // ── TOAST & COUNTERS ──
  function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function actualizarContadores() {
    const pend = pedidos.filter(p => p.estado === 'pendiente').length;
    const entr = pedidos.filter(p => p.estado === 'entregado').length;
    document.getElementById('countPendiente').textContent = pend;
    const ce = document.getElementById('countEntrega');
    if (entr > 0) { ce.textContent = entr; ce.style.display = 'inline-flex'; }
    else { ce.style.display = 'none'; }
    document.getElementById('subtitulo').textContent =
      pend > 0 ? `${pend} pedido${pend > 1 ? 's' : ''} en espera` : 'Todo al día';
  }

  // ── FIREBASE LISTENER ──
  const q = query(collection(db, 'pedidos'), orderBy('timestamp', 'desc'));
  onSnapshot(q, (snap) => {
    const antesP = pedidos.filter(p => p.estado === 'pendiente').length;
    pedidos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const ahoraP = pedidos.filter(p => p.estado === 'pendiente').length;
    if (ahoraP > antesP) mostrarToast('🔔 Nuevo pedido de la barra');
    actualizarContadores();
    renderVista();
  });
</script>
</body>
</html>
