<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almacén — Pedidos</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --oro: #C9A84C;
    --oro-claro: #E8C97A;
    --oro-opaco: #C9A84C22;
    --verde: #4CAF84;
    --verde-opaco: #4CAF8422;
    --negro: #0A0A08;
    --carbon: #0E0E0B;
    --carbon2: #161610;
    --carbon3: #1E1E16;
    --borde: #C9A84C33;
    --borde2: #C9A84C77;
    --texto: #F5EDD6;
    --texto-muted: #8A7D5A;
    --texto-dim: #3A3420;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Cormorant Garamond', Georgia, serif;
    background: var(--negro);
    color: var(--texto);
    min-height: 100vh;
    padding: 28px 20px 40px;
    background-image:
      radial-gradient(ellipse at 50% 0%, #C9A84C08 0%, transparent 55%),
      radial-gradient(ellipse at 0% 80%, #C9A84C04 0%, transparent 40%);
  }

  .ornamento {
    text-align: center;
    color: var(--oro);
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 6px;
    opacity: 0.6;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
    position: relative;
  }

  header::after {
    content: '';
    display: block;
    width: 100px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--oro), transparent);
    margin: 16px auto 0;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--oro-claro);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  header p {
    font-size: 13px;
    color: var(--texto-muted);
    margin-top: 8px;
    letter-spacing: 1px;
    font-weight: 300;
  }

  /* Filtros */
  .filtros {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  .filtro-btn {
    flex: 1;
    padding: 10px 16px;
    border: 1px solid var(--borde);
    background: transparent;
    color: var(--texto-muted);
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .filtro-btn.activo {
    border-color: var(--oro);
    color: var(--oro);
    background: var(--oro-opaco);
  }

  .filtro-btn:hover:not(.activo) { border-color: var(--borde2); color: var(--texto); }

  .contador-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #8B3A3A;
    color: #F5C0C0;
    border-radius: 50%;
    width: 20px; height: 20px;
    font-size: 11px;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
  }

  /* Cards */
  .pedidos-lista { display: flex; flex-direction: column; gap: 16px; }

  .pedido-card {
    background: var(--carbon2);
    border: 1px solid var(--borde);
    border-radius: 4px;
    padding: 20px;
    position: relative;
    overflow: hidden;
    animation: aparecer 0.35s ease;
  }

  @keyframes aparecer {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .pedido-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--oro), transparent);
  }

  .pedido-card.listo {
    border-color: #C9A84C22;
    opacity: 0.5;
  }

  .pedido-card.listo::before {
    background: linear-gradient(90deg, transparent, var(--verde), transparent);
  }

  /* Header de card */
  .pedido-header {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--borde);
  }

  .pedido-header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .pedido-hora {
    font-size: 12px;
    color: var(--texto-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .pedido-sucursal {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--oro-opaco);
    border: 1px solid var(--borde2);
    border-radius: 3px;
    padding: 5px 12px;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    color: var(--oro-claro);
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    align-self: flex-start;
  }

  .badge {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    padding: 3px 12px;
    border-radius: 2px;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .badge.pendiente {
    background: #C9A84C18;
    color: var(--oro);
    border: 1px solid #C9A84C44;
  }

  .badge.listo {
    background: #4CAF8418;
    color: var(--verde);
    border: 1px solid #4CAF8444;
  }

  /* Progreso */
  .progreso-wrap { margin-bottom: 14px; }

  .progreso-texto {
    font-size: 12px;
    color: var(--texto-muted);
    letter-spacing: 1px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
  }

  .progreso-bar-bg {
    height: 2px;
    background: var(--carbon3);
    border-radius: 1px;
    overflow: hidden;
  }

  .progreso-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--oro), var(--oro-claro));
    border-radius: 1px;
    transition: width 0.4s ease;
  }

  /* Items */
  .pedido-items { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }

  .item-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    background: var(--carbon);
    border: 1px solid var(--borde);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }

  .item-row:hover:not(.no-click) { border-color: var(--borde2); background: var(--carbon3); }

  .item-row.tachado {
    opacity: 0.45;
    border-color: transparent;
  }

  .item-check {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid var(--borde2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 11px;
    transition: all 0.2s;
    color: var(--negro);
  }

  .item-row.tachado .item-check {
    background: var(--oro);
    border-color: var(--oro);
  }

  .item-nombre {
    flex: 1;
    font-size: 16px;
    letter-spacing: 0.3px;
    transition: all 0.2s;
  }

  .item-row.tachado .item-nombre {
    text-decoration: line-through;
    color: var(--texto-muted);
  }

  .item-qty {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--oro);
    min-width: 40px;
    text-align: right;
  }

  .item-row.tachado .item-qty { color: var(--texto-dim); }

  /* Nota */
  .nota-texto {
    font-size: 13px;
    color: var(--texto-muted);
    background: var(--carbon);
    padding: 10px 14px;
    border-radius: 3px;
    margin-bottom: 16px;
    border-left: 2px solid var(--oro);
    font-style: italic;
    letter-spacing: 0.3px;
  }

  /* Botones */
  .acciones { display: flex; flex-direction: column; gap: 8px; }

  .btn-listo {
    width: 100%;
    padding: 14px;
    background: transparent;
    color: var(--oro);
    border: 1px solid var(--oro);
    border-radius: 3px;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn-listo::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--oro);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s ease;
  }

  .btn-listo:hover:not(:disabled)::before { transform: scaleX(1); }
  .btn-listo:hover:not(:disabled) { color: var(--negro); }
  .btn-listo span { position: relative; z-index: 1; }

  .btn-listo:disabled {
    border-color: var(--borde);
    color: var(--texto-dim);
    cursor: not-allowed;
  }
  .btn-listo:disabled::before { display: none; }

  .btn-excel {
    width: 100%;
    padding: 12px;
    background: transparent;
    color: var(--verde);
    border: 1px solid #4CAF8444;
    border-radius: 3px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }

  .btn-excel.visible { display: block; }
  .btn-excel:hover { background: var(--verde-opaco); border-color: var(--verde); }

  .btn-deshacer {
    width: 100%;
    padding: 10px;
    background: transparent;
    color: var(--texto-dim);
    border: 1px solid var(--texto-dim);
    border-radius: 3px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-deshacer:hover { color: var(--texto-muted); border-color: var(--texto-muted); }

  /* Sin pedidos */
  .sin-pedidos {
    text-align: center;
    padding: 60px 20px;
    border: 1px solid var(--borde);
    border-radius: 4px;
    background: var(--carbon2);
  }

  .sin-pedidos .ornamento-vacio {
    font-size: 28px;
    display: block;
    margin-bottom: 16px;
    color: var(--borde2);
  }

  .sin-pedidos p {
    font-size: 15px;
    color: var(--texto-muted);
    letter-spacing: 1px;
    font-style: italic;
  }

  /* Toast */
  .toast {
    position: fixed;
    top: 24px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--carbon2);
    border: 1px solid var(--oro);
    color: var(--oro-claro);
    padding: 14px 32px;
    border-radius: 3px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    letter-spacing: 1px;
    transition: transform 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#C9A84C">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="La Barra">
  <link rel="apple-touch-icon" href="icon.png">
</head>
<body>

<div class="toast" id="toast"></div>

<div class="ornamento">✦ &nbsp; Almacén &nbsp; ✦</div>

<header>
  <h1>Almacén</h1>
  <p id="subtitulo">Esperando pedidos...</p>
</header>

<div class="filtros">
  <button class="filtro-btn activo" id="filtro-pendiente" onclick="setFiltro('pendiente')">
    Pendientes
    <span class="contador-badge" id="countPendiente">0</span>
  </button>
  <button class="filtro-btn" id="filtro-listo" onclick="setFiltro('listo')">
    Completados
  </button>
</div>

<div class="pedidos-lista" id="pedidosLista">
  <div class="sin-pedidos">
    <span class="ornamento-vacio">✦</span>
    <p>Conectando al sistema...</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyA_oHjATWDHDvSv7ztqPDfWJkXuLR9ceZs",
    authDomain: "proyecto-2-bara.firebaseapp.com",
    projectId: "proyecto-2-bara",
    storageBucket: "proyecto-2-bara.firebasestorage.app",
    messagingSenderId: "467039108962",
    appId: "1:467039108962:web:e7eb55bd1e10eca09bf63b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let pedidos = [];
  let filtroActual = 'pendiente';
  const tachados = {};

  window.setFiltro = function(f) {
    filtroActual = f;
    document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('activo'));
    document.getElementById('filtro-' + f).classList.add('activo');
    renderPedidos();
  };

  function formatHora(ts) {
    if (!ts) return 'Ahora';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  }

  function formatFecha(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('es-AR') + ' ' + d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  }

  window.toggleItem = function(pedidoId, idx) {
    if (!tachados[pedidoId]) tachados[pedidoId] = new Set();
    if (tachados[pedidoId].has(idx)) tachados[pedidoId].delete(idx);
    else tachados[pedidoId].add(idx);
    const el = document.getElementById('card-' + pedidoId);
    const p = pedidos.find(x => x.id === pedidoId);
    if (el && p) el.outerHTML = buildCardHTML(p);
  };

  function buildCardHTML(p) {
    if (!tachados[p.id]) tachados[p.id] = new Set();
    const total = p.items.length;
    const hechos = tachados[p.id].size;
    const todosListos = hechos === total;
    const pct = total > 0 ? Math.round((hechos / total) * 100) : 0;

    if (p.estado === 'listo') {
      return `
      <div class="pedido-card listo" id="card-${p.id}">
        <div class="pedido-header">
          <div class="pedido-header-top">
            <span class="pedido-hora">🕐 ${formatHora(p.timestamp)}</span>
            <span class="badge listo">Completado</span>
          </div>
          <span class="pedido-sucursal">${p.sucursalIcono || "🏠"} ${p.sucursal || "Sin sucursal"}</span>
        </div>
        <div class="pedido-items">
          ${p.items.map(it => `
            <div class="item-row tachado no-click">
              <div class="item-check">✓</div>
              <span class="item-nombre">${it.nombre}</span>
              <span class="item-qty">× ${it.cantidad}</span>
            </div>`).join('')}
        </div>
        ${p.nota ? `<div class="nota-texto">${p.nota}</div>` : ''}
        <div class="acciones">
          <button class="btn-excel visible" onclick="descargarExcel('${p.id}')">
            ↓ Descargar Excel
          </button>
          <button class="btn-deshacer" onclick="marcarPendiente('${p.id}')">↩ Deshacer</button>
        </div>
      </div>`;
    }

    return `
    <div class="pedido-card nuevo" id="card-${p.id}">
      <div class="pedido-header">
        <div class="pedido-header-top">
          <span class="pedido-hora">🕐 ${formatHora(p.timestamp)}</span>
          <span class="badge pendiente">Pendiente</span>
        </div>
        <span class="pedido-sucursal">${p.sucursalIcono || "🏠"} ${p.sucursal || "Sin sucursal"}</span>
      </div>

      <div class="progreso-wrap">
        <div class="progreso-texto">
          <span>Preparación</span>
          <span>${hechos} / ${total}</span>
        </div>
        <div class="progreso-bar-bg">
          <div class="progreso-bar" style="width:${pct}%"></div>
        </div>
      </div>

      <div class="pedido-items">
        ${p.items.map((it, idx) => `
          <div class="item-row ${tachados[p.id].has(idx) ? 'tachado' : ''}"
               onclick="toggleItem('${p.id}', ${idx})">
            <div class="item-check">${tachados[p.id].has(idx) ? '✓' : ''}</div>
            <span class="item-nombre">${it.nombre}</span>
            <span class="item-qty">× ${it.cantidad}</span>
          </div>`).join('')}
      </div>

      ${p.nota ? `<div class="nota-texto">${p.nota}</div>` : ''}

      <div class="acciones">
        <button class="btn-listo" onclick="marcarListo('${p.id}')" ${!todosListos ? 'disabled' : ''}>
          <span>${todosListos ? 'Confirmar pedido listo' : `Tachá todos los ítems (${hechos}/${total})`}</span>
        </button>
        <button class="btn-excel ${todosListos ? 'visible' : ''}" onclick="descargarExcel('${p.id}')">
          ↓ Descargar Excel
        </button>
      </div>
    </div>`;
  }

  function renderPedidos() {
    const lista = document.getElementById('pedidosLista');
    const filtrados = pedidos.filter(p => p.estado === filtroActual);
    const pendientes = pedidos.filter(p => p.estado === 'pendiente').length;
    document.getElementById('countPendiente').textContent = pendientes;
    document.getElementById('subtitulo').textContent =
      pendientes > 0 ? `${pendientes} pedido${pendientes > 1 ? 's' : ''} en espera` : 'Todo al día';

    if (filtrados.length === 0) {
      lista.innerHTML = `
        <div class="sin-pedidos">
          <span class="ornamento-vacio">✦</span>
          <p>${filtroActual === 'pendiente' ? 'Sin pedidos pendientes' : 'Sin pedidos completados'}</p>
        </div>`;
      return;
    }

    lista.innerHTML = filtrados.map(p => buildCardHTML(p)).join('');
  }

  window.marcarListo = async function(id) {
    await updateDoc(doc(db, 'pedidos', id), { estado: 'listo' });
    mostrarToast('✦ Pedido marcado como listo');
  };

  window.marcarPendiente = async function(id) {
    if (tachados[id]) tachados[id].clear();
    await updateDoc(doc(db, 'pedidos', id), { estado: 'pendiente' });
  };

  window.descargarExcel = function(pedidoId) {
    const p = pedidos.find(x => x.id === pedidoId);
    if (!p) return;
    const fecha = formatFecha(p.timestamp);
    const sucursal = p.sucursal || 'Sin sucursal';

    // Estilo base
    const wb = XLSX.utils.book_new();

    const filas = [
      // Encabezado
      ['PEDIDO DE ALMACÉN', '', ''],
      ['', '', ''],
      ['Sucursal:', sucursal, ''],
      ['Fecha:', fecha, ''],
      ['', '', ''],
      // Tabla productos
      ['N°', 'Producto', 'Cantidad'],
      ...p.items.map((it, i) => [i + 1, it.nombre, it.cantidad]),
      ['', '', ''],
      // Nota
      ...(p.nota ? [['Nota:', p.nota, ''], ['', '', '']] : [['', '', '']]),
      // Firmas
      ['', '', ''],
      ['_________________________', '', '_________________________'],
      ['Recibí conforme', '', 'Entregué conforme'],
      ['Firma / Nombre', '', 'Firma / Nombre'],
    ];

    const ws = XLSX.utils.aoa_to_sheet(filas);

    // Anchos de columna
    ws['!cols'] = [{ wch: 8 }, { wch: 32 }, { wch: 12 }];

    // Combinar celdas del título
    ws['!merges'] = [
      { s: { r: 0, c: 0 }, e: { r: 0, c: 2 } }, // Título
    ];

    // Estilos básicos en celdas clave
    const estiloPROGrama = (celda, negrita, tamanio, alineacion) => {
      if (!ws[celda]) return;
      ws[celda].s = {
        font: { bold: negrita, sz: tamanio || 11 },
        alignment: { horizontal: alineacion || 'left' }
      };
    };

    estiloPROGrama('A1', true, 14, 'center');
    estiloPROGrama('A6', true, 11, 'left');
    estiloPROGrama('B6', true, 11, 'left');
    estiloPROGrama('C6', true, 11, 'left');

    XLSX.utils.book_append_sheet(wb, ws, 'Pedido');
    const nombreArchivo = `pedido_${sucursal}_${fecha.replace(/[/:, ]/g, '_')}.xlsx`;
    XLSX.writeFile(wb, nombreArchivo);
    mostrarToast('✦ Excel descargado');
  };

  function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  const q = query(collection(db, 'pedidos'), orderBy('timestamp', 'desc'));
  onSnapshot(q, (snap) => {
    const antes = pedidos.filter(p => p.estado === 'pendiente').length;
    pedidos = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const ahora = pedidos.filter(p => p.estado === 'pendiente').length;
    if (ahora > antes) mostrarToast('✦ Nuevo pedido de la barra');
    renderPedidos();
  });
</script>
</body>
</html>
